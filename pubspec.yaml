name: flow_admin_mobile
description: Admin mobile application for managing lottery/draw games.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # HTTP
  dio: ^5.4.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Icons
  font_awesome_flutter: ^10.7.0

  # Local Storage
  flutter_secure_storage: ^9.0.0

  # Env Config
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.3

# ─── Launcher icon config ──────────────────────────────────────────────────────
# Place a 1024×1024 PNG at assets/icon/app_icon.png then run:
#   dart run flutter_launcher_icons
#
# Design reference — matches the login screen logo:
#   Blue gradient rounded square (#2E9AEC → #1565A0) with white layers icon.
# ──────────────────────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1565A0"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
